name: FRAME EXTRACTION SCHEDULER

on:
  workflow_dispatch:  # Manual trigger
  # schedule:
  #   - cron: '0 */6 * * *'   # Runs every 6 hours (adjust as needed)

jobs:
  extract-frames:
    runs-on: ubuntu-latest
    
    steps:
      # =======================
      # 1. Checkout Repository
      # =======================
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          sparse-checkout: |
            extract_frames.py
            frame_counter.txt
            VIDEOS/
            IMAGES/
          fetch-depth: 1

      # =======================
      # 2. Configure Sparse Checkout for Video Range
      # =======================
      - name: Configure Sparse Checkout for Video Range
        run: |
          # Read the starting video number
          if [ -f frame_counter.txt ]; then
            START_VIDEO=$(cat frame_counter.txt)
          else
            START_VIDEO=1
            echo "1" > frame_counter.txt
          fi
          
          echo "📹 Processing videos starting from Video_${START_VIDEO}.mp4"
          
          # Add next 10 videos to sparse checkout
          for i in $(seq 0 9); do
            VIDEO_NUM=$((START_VIDEO + i))
            echo "VIDEOS/Video_${VIDEO_NUM}.mp4" >> .git/info/sparse-checkout
          done
          
          git sparse-checkout reapply
          
          echo "✅ Sparse checkout configured for Video_${START_VIDEO} to Video_$((START_VIDEO + 9))"

      # =======================
      # 3. Set up Python Environment
      # =======================
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      # =======================
      # 4. Install Dependencies
      # =======================
      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install opencv-python-headless numpy
          echo "✅ Dependencies installed"

      # =======================
      # 5. Run Frame Extraction Script
      # =======================
      - name: Extract Frames from Videos
        run: |
          echo "🎬 Starting frame extraction..."
          python extract_frames.py
          echo "✅ Frame extraction complete"

      # =======================
      # 6. Commit Frames in Batches
      # =======================
      - name: Commit Extracted Frames in Batches
        run: |
          echo "📦 Committing frames in batches of 1000..."
          
          # Configure git
          git config --local user.name "github-actions[bot]"
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          
          # Get list of all extracted frames
          cd IMAGES
          FRAMES=($(ls -1 *.jpg 2>/dev/null | sort))
          TOTAL_FRAMES=${#FRAMES[@]}
          
          echo "📊 Total frames to commit: $TOTAL_FRAMES"
          
          if [ $TOTAL_FRAMES -eq 0 ]; then
            echo "⚠️ No frames found to commit"
            exit 0
          fi
          
          # Batch size
          BATCH_SIZE=1000
          BATCH_NUM=0
          
          # Commit frames in batches
          for ((i=0; i<$TOTAL_FRAMES; i+=BATCH_SIZE)); do
            BATCH_NUM=$((BATCH_NUM + 1))
            END=$((i + BATCH_SIZE - 1))
            
            if [ $END -ge $TOTAL_FRAMES ]; then
              END=$((TOTAL_FRAMES - 1))
            fi
            
            BATCH_FRAMES=("${FRAMES[@]:$i:$BATCH_SIZE}")
            
            echo "📦 Batch $BATCH_NUM: Committing frames $((i + 1)) to $((END + 1)) of $TOTAL_FRAMES"
            
            # Add frames in this batch
            cd ..
            for frame in "${BATCH_FRAMES[@]}"; do
              git add "IMAGES/$frame"
            done
            
            # Commit this batch
            git commit -m "Add frames batch $BATCH_NUM ($((i + 1))-$((END + 1)) of $TOTAL_FRAMES)" || echo "No changes in this batch"
            
            # Push this batch
            git pull --rebase origin main || echo "No changes to pull"
            git push || echo "Push failed for batch $BATCH_NUM"
            
            cd IMAGES
            
            echo "✅ Batch $BATCH_NUM committed and pushed"
          done
          
          cd ..
          echo "✅ All $TOTAL_FRAMES frames committed in $BATCH_NUM batches"

      # =======================
      # 7. Update Counter File
      # =======================
      - name: Commit Counter File
        run: |
          git config --local user.name "github-actions[bot]"
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          
          # Get the video range that was processed
          if [ -f frame_counter.txt ]; then
            PREV_START=$(($(cat frame_counter.txt) - 10))
            NEXT_START=$(cat frame_counter.txt)
          else
            PREV_START=1
            NEXT_START=11
          fi
          
          # Commit the counter
          git add frame_counter.txt
          git commit -m "Update counter: Video_${PREV_START} to Video_$((PREV_START + 9)) complete. Next: Video_${NEXT_START}" || echo "No counter changes"
          
          # Pull and push
          git pull --rebase origin main || echo "No changes to pull"
          git push || echo "No changes to push"
          
          echo "✅ Counter file updated"

      # =======================
      # 8. Verify Extraction Results
      # =======================
      - name: Verify Extracted Frames
        run: |
          if [ -d "IMAGES" ]; then
            FRAME_COUNT=$(ls -1 IMAGES/*.jpg 2>/dev/null | wc -l)
            echo "📊 Total frames in IMAGES folder: $FRAME_COUNT"
            
            # Show some sample filenames
            echo "📸 Sample extracted frames:"
            ls -1 IMAGES/*.jpg 2>/dev/null | head -5
          else
            echo "⚠️ IMAGES folder not found"
          fi

      # =======================
      # 9. Extraction Summary
      # =======================
      - name: Extraction Summary
        if: always()
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "   FRAME EXTRACTION SUMMARY"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          
          if [ -f frame_counter.txt ]; then
            NEXT_START=$(cat frame_counter.txt)
            echo "✅ Processed: Video_$((NEXT_START - 10)) to Video_$((NEXT_START - 1))"
            echo "📹 Next batch: Video_${NEXT_START} to Video_$((NEXT_START + 9))"
          fi
          
          if [ -d "IMAGES" ]; then
            FRAME_COUNT=$(ls -1 IMAGES/*.jpg 2>/dev/null | wc -l)
            echo "📊 Total frames extracted: $FRAME_COUNT"
            
            FOLDER_SIZE=$(du -sh IMAGES 2>/dev/null | cut -f1)
            echo "💾 IMAGES folder size: $FOLDER_SIZE"
          fi
          
          echo ""
          echo "💡 To process more videos, run this workflow again"
          echo "💡 To change batch size, edit extract_frames.py (videos_per_batch)"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
